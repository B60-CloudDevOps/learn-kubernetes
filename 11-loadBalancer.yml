# create LoadBalancer service ; We can make the service accessible from outside the cluster
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
spec:
  selector:
    tier: frontend
  ports:
    - protocol: TCP
      port: 80                 # Service accepts the requests on this port
      targetPort: 80           # Target port in the pods
  type: LoadBalancer           # Service type; if you don't mention, it by default is LoadBalancer

--- 
# create deployment with nginx as image
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: roboshop
    tier: frontend
spec:
  # modify replicas according to your case
  replicas: 5
  selector:
    matchLabels:
      tier: frontend
  template:
    metadata:
      labels:
        tier: frontend
    spec:
      containers:
      - name: nginx-apps
        image: nginx:1.31.2-perl