# Creating a Secret this way is never recommended for production use as here we just supply encoded values
apiVersion: v1
kind: Secret
metadata:
  name: roboshop-secret
type: Opaque
data:
  username: cm9vdAo=
  password: cGFzc3dvcmQxMAo=

---
# Pod secret configuration using the Secret
apiVersion: v1
kind: Pod
metadata:
  name: secret-demo
spec:
  containers:
  - name: demo
    image: nginx:1.14.2
    envFrom:
    - secretRef:
        name: roboshop-secret