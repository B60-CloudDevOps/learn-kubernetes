# Scope of the service on kubernetes cluster is with in the namespace. 

# create clusterIP service
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
spec:
  selector:
    tier: frontend
  ports:
    - protocol: TCP
      port: 80                 # Service accepts the requests on this port
      targetPort: 80           # Target port in the pods
  type: ClusterIP              # Service type; if you don't mention, it by default is ClusterIP

--- 
# create deployment with nginx as image
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: roboshop
    tier: frontend
spec:
  # modify replicas according to your case
  replicas: 5
  selector:
    matchLabels:
      tier: frontend
  template:
    metadata:
      labels:
        tier: frontend
    spec:
      containers:
      - name: nginx-apps
        image: nginx:1.31.2-perl


---

# creates namespace roboshop
apiVersion: v1
kind: Namespace
metadata:
  name: roboshop
  
--- 
# creates a pod named nginx in the roboshop namespace
apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  namespace: roboshop
spec:
  containers:
  - name: nginx
    image: nginx:1.14.2
    ports:
    - containerPort: 80